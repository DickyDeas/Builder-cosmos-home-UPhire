[build]
  base = "uphire"
  command = "npm run build"
  publish = "dist"
  functions = "api"

# Redirect root to app (avoids 404 when visiting site root)
[[redirects]]
  from = "/"
  to = "/app"
  status = 302

# SPA fallback for /app subpath - serve app at uphireiq.com/app
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
