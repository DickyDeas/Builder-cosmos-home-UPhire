[build]
  command = "npm run build"
  publish = "dist"
  functions = "api"
  # Base directory when repo root contains uphire subfolder (e.g. Builder-cosmos-home-UPhire-updated-final)
  base = "uphire"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
