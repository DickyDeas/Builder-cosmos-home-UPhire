[build]
  base = "uphire"
  command = "npm run build"
  publish = "dist"
  functions = "api"

# Market Intelligence API proxies (salary data)
[[redirects]]
  from = "/api/adzuna-proxy"
  to = "/.netlify/functions/adzuna-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/api/itjobswatch-proxy"
  to = "/.netlify/functions/itjobswatch-proxy"
  status = 200
  force = true

# Grok AI proxy (keeps API key server-side)
[[redirects]]
  from = "/api/grok-proxy"
  to = "/.netlify/functions/grok-proxy"
  status = 200
  force = true

# Email send proxy (keeps Brevo key server-side)
[[redirects]]
  from = "/api/email-send"
  to = "/.netlify/functions/email-send"
  status = 200
  force = true

# Audit log (server-side write, bypasses RLS)
[[redirects]]
  from = "/api/audit-log"
  to = "/.netlify/functions/audit-log"
  status = 200
  force = true

# GDPR data export
[[redirects]]
  from = "/api/export-candidate-data"
  to = "/.netlify/functions/export-candidate-data"
  status = 200
  force = true

# GDPR data erasure (purge)
[[redirects]]
  from = "/api/purge-candidate-data"
  to = "/.netlify/functions/purge-candidate-data"
  status = 200
  force = true

# Job board posting
[[redirects]]
  from = "/api/job-board-post"
  to = "/.netlify/functions/job-board-post"
  status = 200
  force = true

# Role flags check
[[redirects]]
  from = "/api/role-flags-check"
  to = "/.netlify/functions/role-flags-check"
  status = 200
  force = true

# Health check (monitoring, load balancers)
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

# Roles needing attention (0 applicants after 5+ days)
[[redirects]]
  from = "/api/roles-needing-attention"
  to = "/.netlify/functions/roles-needing-attention"
  status = 200
  force = true

# Admin: all tenants (staff only)
[[redirects]]
  from = "/api/admin-tenants"
  to = "/.netlify/functions/admin-tenants"
  status = 200
  force = true

# Admin: check if user is staff
[[redirects]]
  from = "/api/is-staff"
  to = "/.netlify/functions/is-staff"
  status = 200
  force = true

# Redirect root to app (avoids 404 when visiting site root)
[[redirects]]
  from = "/"
  to = "/app"
  status = 302

# SPA fallback for /app subpath - serve app at uphireiq.com/app
[[redirects]]
  from = "/app"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

# Security headers (HSTS, X-Content-Type-Options, etc.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
